  accessible: true
  copyPaste: false
  csvExport: false
  customEditors: true
  customFormatters: true
  draggableRows: false
  editable: false
  fillDown: false
  fillRight: false
  filtering: true
  formulas: false
  freezableCols: true
  headless: false
  i18n: false
  maintained: true
  mergeCells: false
  openSource: false
  pagination: true
  pdfExport: false
  pivots: false
  rangeSelection: false
  resizableCols: true
  responsive: true
  rowGrouping: true
  rowPinning: false
  rowSelection: true
  search: true
  serverSide: true
  sorting: true
  sparklines: false
  theming: true
  trees: false
  typescript: true
  xlsxExport: false
  virtualization: true
